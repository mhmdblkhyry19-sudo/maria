<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title>مولد المشاريع المربحة</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
        }

        select,
        button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00c9a7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00a98b;
        }

        .result {
            margin-top: 20px;
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 مولد المشاريع المربحة</h1>

        <p>اختر مستواك:</p>
        <select id="budget">
            <option value="low">بدون رأس مال</option>
            <option value="medium">رأس مال متوسط</option>
        </select>

        <p>اختر مهارتك:</p>
        <select id="skill">
            <option value="none">بدون مهارة</option>
            <option value="design">تصميم</option>
            <option value="writing">كتابة</option>
        </select>

        <br>
        <button onclick="generateIdea()">اعطيني فكرة 💡</button>

        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
        const ideas = [
            {
                budget: "low",
                skill: "none",
                title: "إنشاء قناة TikTok",
                desc: "أنشئ قناة وشارك محتوى بسيط (قصص، معلومات، تحفيز)",
                steps: "1- اختر مجال\n2- انشر يومياً\n3- اربح من الإعلانات أو التسويق"
            },
            {
                budget: "low",
                skill: "design",
                title: "بيع تصاميم على الإنترنت",
                desc: "صمم شعارات أو بوستات وبيعها",
                steps: "1- استخدم Canva\n2- انشر خدماتك\n3- استقبل طلبات"
            },
            {
                budget: "low",
                skill: "writing",
                title: "الكتابة مقابل المال",
                desc: "اكتب مقالات أو منشورات",
                steps: "1- سجل في مواقع العمل\n2- قدم خدماتك\n3- ابني سمعة"
            },
            {
                budget: "medium",
                skill: "none",
                title: "بيع منتجات محلية",
                desc: "اشتري وبيع منتجات في منطقتك",
                steps: "1- اختار منتج\n2- سوق عبر فيسبوك\n3- سلم للزبائن"
            }
        ];

        function generateIdea() {
            const budget = document.getElementById("budget").value;
            const skill = document.getElementById("skill").value;

            const filtered = ideas.filter(i => i.budget === budget && i.skill === skill);

            if (filtered.length === 0) {
                document.getElementById("result").style.display = "block";
                document.getElementById("result").innerHTML = "❌ لا توجد فكرة حالياً";
                return;
            }

            const idea = filtered[Math.floor(Math.random() * filtered.length)];

            document.getElementById("result").style.display = "block";
            document.getElementById("result").innerHTML = `
        <h3>${idea.title}</h3>
        <p>${idea.desc}</p>
        <pre>${idea.steps}</pre>
    `;
        }
    </script>

</body>

</html>
